name: HK Market Pulse

on:
  schedule:
    # UTC 时间，港股交易日 (周一到周五)
    # 北京/香港时间 = UTC + 8
    - cron: '30 2 * * 1-5'   # 香港 10:30 盘中
    - cron: '10 4 * * 1-5'   # 香港 12:10 午评
    - cron: '10 8 * * 1-5'   # 香港 16:10 收盘
  workflow_dispatch:           # 支持手动触发（测试用）

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests longbridge

      - name: Generate article
        env:
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          BABBAGE_AGENT_URL: ${{ secrets.BABBAGE_AGENT_URL }}
          BABBAGE_API_KEY: ${{ secrets.BABBAGE_API_KEY }}
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --cached --quiet || git commit -m "📰 $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M') 港股市场脉搏"
          git push
